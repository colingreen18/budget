{% extends "budget/base.html" %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-md-6">

    <h2 class="mb-4 text-center">My Profile</h2>

    <!-- Profile update form -->
    <form method="post" class="card p-4 shadow-sm">
        {% csrf_token %}

        <!-- First & Last Name -->
        <div class="mb-3">
            <label for="id_first_name" class="form-label">First Name</label>
            <input type="text" name="first_name" id="id_first_name" class="form-control" value="{{ user.first_name }}">
        </div>

        <div class="mb-3">
            <label for="id_last_name" class="form-label">Last Name</label>
            <input type="text" name="last_name" id="id_last_name" class="form-control" value="{{ user.last_name }}">
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label for="id_email" class="form-label">Email</label>
            <input type="email" name="email" id="id_email" class="form-control" value="{{ user.email }}">
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label for="id_password1" class="form-label">New Password</label>
            <input type="password" name="password1" id="id_password1" class="form-control" placeholder="Leave blank to keep current password">
        </div>

        <div class="mb-3">
            <label for="id_password2" class="form-label">Confirm Password</label>
            <input type="password" name="password2" id="id_password2" class="form-control" placeholder="Repeat new password">
        </div>

        <!-- Submit -->
        <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary">Update Profile</button>
        </div>
    </form>

    <!-- Household / Family ID -->
    <div class="card p-3 mt-4 text-center shadow-sm">
        <h5 class="mb-2">Household ID</h5>
        <div class="d-flex justify-content-center align-items-center gap-2">
            <input type="text" class="form-control text-center" id="familyId" value="{{ user.familymember.household.invite_code }}" readonly style="max-width: 300px;">
            <button type="button" class="btn btn-outline-primary btn-sm" onclick="copyFamilyId()">
                Copy
            </button>
        </div>
        <p class="mb-0 mt-2 text-muted">Share this ID with others to join your household in the app.</p>
    </div>

  </div>
</div>

<script>
function copyFamilyId() {
    const input = document.getElementById('familyId');
    input.select();
    input.setSelectionRange(0, 99999); // for mobile devices
    navigator.clipboard.writeText(input.value).then(() => {
        // Optional: give feedback
        alert('Family ID copied to clipboard!');
    });
}
</script>

{% endblock %}
