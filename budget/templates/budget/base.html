{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="{% static 'budget/style.css' %}">
    <meta charset="UTF-8">
    <title>Family Budget App</title>
</head>
<body>
    {% if user.is_authenticated and request.path != '/signup/' and request.path != '/login/' %}
    <p>Logged in as {{ user.first_name }} | <a href="{% url 'logout' %}">Logout</a></p>
    {% endif %}

    <hr>
    {% block content %}{% endblock %}
</body>
</html>
