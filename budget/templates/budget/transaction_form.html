{% extends "budget/base.html" %}

{% block content %}

<div class="row justify-content-center">
  <div class="col-12 col-md-6">

    <h2 class="mb-4 text-center">{{ action }} Transaction</h2>

    <form method="post" class="card p-4 shadow-sm">
        {% csrf_token %}

        <div class="mb-3">
            <label for="id_amount" class="form-label">Amount</label>
            {{ form.amount }}
        </div>

        <div class="mb-3">
            <label for="id_date" class="form-label">Date</label>
            {{ form.date }}
        </div>

        <div class="mb-3">
            <label for="id_store" class="form-label">Store</label>
            <select id="id_store" name="store" class="form-select">
                <option value="">---------</option>
                {% for store in form.fields.store.queryset %}
                    <option value="{{ store.id }}"
                            data-default-category="{{ store.default_category_id }}">
                        {{ store.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="id_category" class="form-label">Category</label>
            {{ form.category }}
        </div>

        <div class="mb-3">
            <label for="id_description" class="form-label">Description</label>
            {{ form.description }}
        </div>

        <div class="d-grid mt-3">
            <button type="submit" class="btn btn-primary">Save Transaction</button>
        </div>

    </form>

    <div class="text-center mt-3">
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm">
            ← Back to Dashboard
        </a>
    </div>

  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const storeSelect = document.getElementById('id_store');
    const categorySelect = document.getElementById('id_category');

    if (!storeSelect || !categorySelect) return;

    storeSelect.addEventListener('change', function () {
        const selectedOption = storeSelect.options[storeSelect.selectedIndex];
        const defaultCategoryId = selectedOption.dataset.defaultCategory;

        if (defaultCategoryId) {
            categorySelect.value = defaultCategoryId;
        }
    });
});
</script>

{% endblock %}
